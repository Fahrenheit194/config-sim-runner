# Default configuration for projectile motion sim model
# Properties of standard tennis ball

simulation = projectile

dt = 0.01
t_end = 20

launch_speed = 20        # m/s
launch_angle_deg = 45    # degrees
g = 9.81                 # m/s^2

drag = quadratic
mass = 0.057             # kg
rho = 1.2                # kg/m^3
cd = 0.55                # drag coefficient
area = 0.0035            # m^2

output_csv = run.csv
replay_file = run.rep

replay_csv = replay.csv
